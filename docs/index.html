<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Keeble — Family Documentation Vault</title>
    <meta name="description" content="Keeble — An open-source family documentation vault" />
    <link rel="icon" type="image/svg+xml" href="_media/favicon.svg" />
    <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css" />
    <style>
      :root {
        --theme-color: #228be6;
        --sidebar-width: 280px;
      }
      .sidebar .app-name-link {
        font-weight: 700;
        font-size: 1.2rem;
      }
      .markdown-section h1:first-child {
        margin-top: 0;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script>
      window.$docsify = {
        name: "Keeble",
        repo: "https://github.com/pygillier/keeble",
        logo: "",
        loadSidebar: true,
        loadNavbar: true,
        subMaxLevel: 2,
        auto2top: true,
        homepage: "README.md",
        search: {
          maxAge: 86400000,
          paths: "auto",
          placeholder: "Search docs…",
          noData: "No results.",
          depth: 4,
        },
        copyCode: {
          buttonText: "Copy",
          errorText: "Error",
          successText: "Copied!",
        },
        pagination: {
          previousText: "Previous",
          nextText: "Next",
          crossChapter: true,
          crossChapterText: true,
        },
        plugins: [],
      };
    </script>
    <script src="//cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>
    <script src="//cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
    <script src="//cdn.jsdelivr.net/npm/docsify-copy-code@2/dist/docsify-copy-code.min.js"></script>
    <script src="//cdn.jsdelivr.net/npm/docsify-pagination/dist/docsify-pagination.min.js"></script>
    <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-bash.min.js"></script>
    <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-yaml.min.js"></script>
    <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-typescript.min.js"></script>
    <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-docker.min.js"></script>
  </body>
</html>
