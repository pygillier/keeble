version: "3"

includes:
  doc: ./docs
  frontend: ./frontend
  backend: ./backend

tasks:
  mongo:up:
    desc: Start local MongoDB for development
    cmds:
      - docker compose -f docker-compose.dev.yml up -d

  mongo:down:
    desc: Stop local MongoDB
    cmds:
      - docker compose -f docker-compose.dev.yml down

  dev:
    desc: Run mongo, backend and frontend dev servers together
    deps:
      - mongo:up
      - backend:dev
      - frontend:dev

  docker:build:
    desc: Build production docker images
    cmds:
      - docker compose build

  docker:up:
    desc: Start production stack
    cmds:
      - docker compose up -d
